name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]

jobs:
  build_and_test:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        version: [stable]

    name: ${{ matrix.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust (${{ matrix.version }})
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: ${{ matrix.version }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get -y install sqlite3
          sudo apt-get -y install libpq-dev
          sudo apt-get -y install redis-server

      - name: Install DB CLI tools
        run: |
          cargo install --force sqlx-cli --no-default-features --features=sqlite,rustls
          cargo install --force diesel_cli --no-default-features --features=sqlite,postgres

      - name: Create Test DBs
        env:
          DATABASE_URL: sqlite://./todo.db
        run: |
          sqlx database create
          chmod a+rwx ./todo.db
          sqlx migrate run --source=./basics/todo/migrations

      - name: Start Redis
        run: |
          if ! redis-cli ping; then
            redis-server --daemonize yes
          fi
          redis-cli ping

      - name: cargo check
        run: cargo check --workspace --bins --examples --tests
        timeout-minutes: 30

      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast --exclude=db-diesel -- --nocapture
        timeout-minutes: 30

      - name: cargo test (diesel)
        env:
          DATABASE_URL: test.db
        run: |
          cd databases/diesel
          diesel migration run
          chmod a+rwx test.db
          cargo test -p=db-diesel --no-fail-fast -- --nocapture
        timeout-minutes: 10

      - name: Install cargo-ci-cache-clean
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-ci-cache-clean

      - name: CI cache clean
        run: cargo-ci-cache-clean
